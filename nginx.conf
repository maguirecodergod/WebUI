events { }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip settings for Blazor WASM
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/wasm application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        # Don't cache service-worker or index.html
        location ~* (service-worker\.js|index\.html)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
