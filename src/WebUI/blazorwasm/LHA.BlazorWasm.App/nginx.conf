events { }

http {
    include /etc/nginx/mime.types;
    
    types {
        application/wasm wasm;
        application/octet-stream clr;
        application/octet-stream dll;
        application/octet-stream pdb;
        application/octet-stream dat;
        application/octet-stream json;
    }

    server {
        listen 0.0.0.0:8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Enable compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
        
        # Support pre-compressed files (.gz, .br)
        gzip_static on;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|woff|woff2|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self';";
    }
}