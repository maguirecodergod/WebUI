    <style>
        /* ─── Boot Loader Reset ─────────────────────────────────────────── */
        #boot-loader *,
        #boot-loader *::before,
        #boot-loader *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ─── Root Variables ────────────────────────────────────────────── */
        :root {
            --bl-bg-from: #0a0f1e;
            --bl-bg-to: #0d1b38;
            --bl-accent: #3b82f6;
            --bl-accent-2: #6366f1;
            --bl-accent-glow: rgba(99, 102, 241, 0.25);
            --bl-surface: rgba(255, 255, 255, 0.04);
            --bl-surface-border: rgba(255, 255, 255, 0.08);
            --bl-text-primary: #f0f4ff;
            --bl-text-secondary: rgba(240, 244, 255, 0.55);
            --bl-ring-size: 88px;
            --bl-ring-stroke: 3px;
            --bl-radius: 20px;
        }

        /* ─── Full-screen overlay ───────────────────────────────────────── */
        #boot-loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 60% 20%, #111c40 0%, var(--bl-bg-from) 60%),
                linear-gradient(160deg, var(--bl-bg-from) 0%, var(--bl-bg-to) 100%);
            z-index: 9999;
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #boot-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ─── Decorative orbs ───────────────────────────────────────────── */
        .bl-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            will-change: transform;
        }

        .bl-orb-1 {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(99, 102, 241, .18) 0%, transparent 70%);
            top: -120px;
            left: -100px;
            animation: bl-orb-drift 14s ease-in-out infinite alternate;
        }

        .bl-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, .14) 0%, transparent 70%);
            bottom: -100px;
            right: -80px;
            animation: bl-orb-drift 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes bl-orb-drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, -30px) scale(1.08);
            }
        }

        /* ─── Dot grid background ───────────────────────────────────────── */
        #boot-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* ─── Card ──────────────────────────────────────────────────────── */
        .bl-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 48px 52px 44px;
            background: var(--bl-surface);
            border: 1px solid var(--bl-surface-border);
            border-radius: var(--bl-radius);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .05) inset,
                0 24px 64px rgba(0, 0, 0, .5),
                0 0 80px var(--bl-accent-glow);
            animation: bl-card-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            max-width: 380px;
            width: calc(100vw - 40px);
        }

        @keyframes bl-card-in {
            from {
                opacity: 0;
                transform: translateY(24px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ─── Top accent line ───────────────────────────────────────────── */
        .bl-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bl-accent), var(--bl-accent-2), transparent);
            border-radius: 9999px;
        }

        /* ─── Logo area ─────────────────────────────────────────────────── */
        .bl-logo-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--bl-ring-size);
            height: var(--bl-ring-size);
        }

        /* Spinning gradient ring */
        .bl-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: var(--bl-ring-stroke);
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    var(--bl-accent) 40%,
                    var(--bl-accent-2) 60%,
                    transparent 100%);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: bl-ring-spin 1.6s linear infinite;
        }

        @keyframes bl-ring-spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Static inner ring (creates track look) */
        .bl-ring-track {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: var(--bl-ring-stroke) solid rgba(255, 255, 255, .07);
        }

        /* Logo icon */
        .bl-logo-icon {
            position: relative;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--bl-accent) 0%, var(--bl-accent-2) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, .45);
            animation: bl-logo-pulse 2.8s ease-in-out infinite;
        }

        @keyframes bl-logo-pulse {

            0%,
            100% {
                box-shadow: 0 4px 20px rgba(99, 102, 241, .45);
            }

            50% {
                box-shadow: 0 4px 32px rgba(99, 102, 241, .75), 0 0 0 6px rgba(99, 102, 241, .1);
            }
        }

        .bl-logo-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        /* ─── App name & tagline ────────────────────────────────────────── */
        .bl-brand {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bl-app-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--bl-text-primary);
            background: linear-gradient(90deg, #e0e9ff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bl-tagline {
            font-size: .78rem;
            color: var(--bl-text-secondary);
            letter-spacing: .4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ─── Progress bar ──────────────────────────────────────────────── */
        .bl-progress-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bl-progress-track {
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, .08);
            border-radius: 9999px;
            overflow: hidden;
        }

        /* Filled bar — driven by CSS custom property set via JS */
        .bl-progress-fill {
            height: 100%;
            width: var(--bl-prog, 0%);
            background: linear-gradient(90deg, var(--bl-accent), var(--bl-accent-2));
            border-radius: 9999px;
            transition: width .4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Shimmering highlight on the fill */
        .bl-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 40%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
            animation: bl-shimmer 1.4s ease-in-out infinite;
        }

        @keyframes bl-shimmer {
            0% {
                transform: translateX(-200%);
            }

            100% {
                transform: translateX(400%);
            }
        }

        /* Hidden Blazor elements — we use our own DOM */
        .loading-progress,
        .loading-progress-text {
            display: none !important;
        }

        /* ─── Loading phase text ────────────────────────────────────────── */
        .bl-phase {
            font-size: .82rem;
            font-weight: 500;
            color: var(--bl-text-secondary);
            letter-spacing: .2px;
            min-height: 1.2em;
            text-align: center;
        }

        .bl-phase span {
            display: inline-block;
            animation: bl-phase-in .3s ease both;
        }

        @keyframes bl-phase-in {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulsing dots */
        .bl-dots span {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--bl-accent);
            margin: 0 2px;
            animation: bl-dot-bounce .9s ease-in-out infinite;
        }

        .bl-dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .bl-dots span:nth-child(3) {
            animation-delay: .30s;
        }

        @keyframes bl-dot-bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            40% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        /* ─── Footer ────────────────────────────────────────────────────── */
        .bl-footer {
            font-size: .7rem;
            color: rgba(240, 244, 255, .25);
            letter-spacing: .3px;
        }

        /* ─── Responsive ────────────────────────────────────────────────── */
        @media (max-width: 420px) {
            .bl-card {
                padding: 36px 28px 32px;
                gap: 22px;
                border-radius: 16px;
            }

            .bl-app-name {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <!-- ═══════════════════════════════════════════════════════════════════
         Enterprise Boot Loader
    ════════════════════════════════════════════════════════════════════ -->
    <div id="app">
        <!-- Hidden Blazor progress hooks (required by framework) -->
        <svg class="loading-progress" aria-hidden="true">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text" aria-hidden="true"></div>

        <!-- ── Visible boot loader ── -->
        <div id="boot-loader" role="status" aria-label="Application loading">
            <!-- Background orbs -->
            <div class="bl-orb bl-orb-1" aria-hidden="true"></div>
            <div class="bl-orb bl-orb-2" aria-hidden="true"></div>

            <!-- Card -->
            <div class="bl-card">
                <!-- Logo + ring -->
                <div class="bl-logo-wrap" aria-hidden="true">
                    <div class="bl-ring-track"></div>
                    <div class="bl-ring"></div>
                    <div class="bl-logo-icon">
                        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
                            aria-hidden="true">
                            <defs>
                                <linearGradient id="bl-lg" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fff" stop-opacity="0.98" />
                                    <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.9" />
                                </linearGradient>
                            </defs>
                            <rect x="27" y="14" width="10" height="36" rx="3" fill="url(#bl-lg)" />
                            <rect x="27" y="14" width="10" height="36" rx="3" fill="url(#bl-lg)"
                                transform="rotate(60 32 32)" />
                            <rect x="27" y="14" width="10" height="36" rx="3" fill="url(#bl-lg)"
                                transform="rotate(120 32 32)" />
                            <circle cx="32" cy="32" r="6" fill="#fff" />
                        </svg>
                    </div>
                </div>

                <!-- Brand -->
                <div class="bl-brand">
                    <div class="bl-app-name">LHA Platform</div>
                    <div class="bl-tagline">Enterprise Management Suite</div>
                </div>

                <!-- Progress -->
                <div class="bl-progress-wrap">
                    <div class="bl-progress-track">
                        <div class="bl-progress-fill" id="bl-fill"></div>
                    </div>
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div class="bl-phase" id="bl-phase"><span>Initializing</span></div>
                        <div class="bl-dots" aria-hidden="true">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>

                <!-- Version / build info -->
                <div class="bl-footer" id="bl-version">v1.0.0 &nbsp;·&nbsp; &copy; 2026 LHA</div>
            </div>
        </div>
    </div>



    <script>
        // ── Boot-loader controller ──────────────────────────────────────
        (function () {
            'use strict';

            const fill = document.getElementById('bl-fill');
            const phaseEl = document.getElementById('bl-phase');
            const loader = document.getElementById('boot-loader');

            const phases = [
                { at: 0, label: 'Initializing' },
                { at: 20, label: 'Loading modules' },
                { at: 55, label: 'Starting application' },
                { at: 85, label: 'Almost ready' },
                { at: 99, label: 'Ready' },
            ];

            let currentPhaseIdx = 0;

            /** Update the gradient-bar width and phase label */
            function setProgress(pct) {
                if (!fill) return;
                fill.style.setProperty('--bl-prog', pct + '%');

                // Advance phase label
                for (let i = phases.length - 1; i >= 0; i--) {
                    if (pct >= phases[i].at && i > currentPhaseIdx) {
                        currentPhaseIdx = i;
                        setPhase(phases[i].label);
                        break;
                    }
                }
            }

            function setPhase(label) {
                if (!phaseEl) return;
                phaseEl.innerHTML = '<span>' + label + '</span>';
            }

            // ── Watch Blazor's hidden SVG ring for progress ────────────
            // Blazor animates the stroke-dasharray on the second <circle>.
            // We poll it and derive a 0-100 percentage from it.
            function readBlazorProgress() {
                const svgEl = document.querySelector('.loading-progress');
                if (!svgEl) return 0;
                const circles = svgEl.querySelectorAll('circle');
                if (circles.length < 2) return 0;

                const style = window.getComputedStyle(circles[1]);
                const sda = style.getPropertyValue('stroke-dasharray') || '';
                // Format Blazor uses: "XX% 100%"
                const match = sda.match(/^([\d.]+)%/);
                return match ? parseFloat(match[1]) : 0;
            }

            // Kick off polling — runs ~30 fps until Blazor finishes
            let raf;
            function poll() {
                const pct = readBlazorProgress();
                setProgress(pct);

                if (pct < 100) {
                    raf = requestAnimationFrame(poll);
                } else {
                    // Small grace delay then fade out
                    setTimeout(function () {
                        if (loader) loader.classList.add('hidden');
                        // Remove from DOM after the CSS transition completes
                        setTimeout(function () {
                            if (loader) loader.remove();
                        }, 700);
                    }, 300);
                }
            }

            poll();
        })();
    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
